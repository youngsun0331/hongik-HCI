<!DOCTYPE html>
<html><head><meta charset="utf-8">
<title>HCI 5장 실습 테이블</title>
    <style>
    .first {
    border : 2px solid yellowgreen;
    color : blue;
    background : aliceblue;
    }
    .fispan {
    border : 3px dotted red;
    background : yellow;
    }
    .second {
    display : inline-block;
    height : 50px;
    width : 50px;
    border : 1px solid lightgray;
    text-align : center;
    color : white;
    background : red;
    }
    #down:hover{
    position : relative;
    left : 20px; 
    top : 20px;
    background : green;
    }
    #up:hover{
    position : relative;
    right : 20px; 
    bottom : 20px;
    background : green;
    }

    #menubar {
    background : white;

    }
    #menubar ul { /* 여백과 패딩 모두 0 */
    margin : 0;
    padding : 0;
    width : 567px;  /* 모든 아이템(<li>)을 한 줄에 품을 수 있는 폭 */
    }
    #menubar ul li {
    display : inline-block;
    list-style-type : none; 
    /* 새 줄로 넘어가지않게*/
    /* 마커 삭제 */
    padding : 0px 15px; /* top=bottom=0, left=right=15px */ 
    }
    #menubar ul li a {
        background : olive;
        color : white;
        text-decoration : none; 
        border-radius: 5px;
        /* 링크 보이지 않게 */
    }
    #menubar ul li a:hover {
    color : violet;  /* 마우스 올라 갈 때 색 */
    }
    
    table { /* 이중 테두리 제거 */
    border-collapse : collapse;
    }
    td, th { /* 모든 셀에 적용 */
    text-align : left;
    padding : 10px;
    height : 20px;
    width : 100px;
    }
    thead { /* <thead>의 모든 셀 적용 */
    background : darkgray;
    color : yellow;
    }
    tbody tr:nth-child(even) { /* 짝수 <tr>에 적용*/
    background : aliceblue;
    }
    td, tfoot th { /* 아래쪽 테두리만 회색 */
    border-bottom : 1px solid gray
    }
    tbody td:hover {
    background : pink;
    }
    
    input[type=text] { /* text 창에만 적용 */
    color : red; 
    }
    input:hover, textarea:hover { /* 마우스 올라 올 때 */
    background : aliceblue;
    }
    input[type=text]:focus, input[type=email]:focus { /* 포커스 받을 때 */
    font-size : 120%; 
    }
    label {
    display : block; /* 새 라인에서 시작 */
    padding : 10px;
    }
    label span {
    display : inline-block;
    width : 90px;
    text-align : right;
    padding : 10px;
    }
    </style>
</head>
<body>

        <h3>C311215 , 이영선 &copy;</h3>
        <hr>
    <nav id="menubar">
        
        <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Espresso</a></li>
        <li><a href="#">Cappuccino</a></li>
        <li><a href="#">Cafe Latte</a></li>
        <li><a href="#">F.A.Q</a></li>
        </ul>
    </nav>
    <hr>


    <table> 

        <tfoot>
        <tr><th>합</th><th>175</th><th>169</th></tr>
        </tfoot>
        <tbody>
        <thead>
        <tr><th>이름</th><th>HTML</th><th>CSS</th></tr>
        </thead>
        <tfoot>
        <tr><th>합</th><th>175</th><th>169</th></tr>
        </tfoot>
        <tbody>
        <tr><td>황기태</td><td>80</td><td>70</td></tr>
        <tr><td>이재문</td><td>95</td><td>99</td></tr>
        <tbody>
    </table>
    <form>
    <label>
    <span>Name</span><input type="text" placeholder="Elvis"><br>
    </label>
    <label>
    <span>Email</span><input type="email" placeholder="elvis@graceland.com">
    </label>
    <label>
    <span>Comment</span><textarea placeholder="메시지를 남겨주세요"></textarea>
    </label>
    <label>
    <span></span><input type="submit" value="submit">
    </label>
    </form>
    </body>
</html>
