<!DOCTYPE hmtl>
<html>
<head>
<meta charset="utf-8">
<title>3장 Form 실습</title>
</head>
<body>
<h3>C311215 이영선 &copy</h3>
    <form>
        <fieldset>
            <legend>회원 정보</legend>
        이름 : <input type="text" placeholder="이름을 입력하세요"><br>
        암호 : <input type="password" placeholder="암호를 입력하세요"><br>
        자소서 : <textarea type="text" cols="20" rows="5">이곳에 자기소개서 작성</textarea><br>
        email : <input type="email" placeholder="id@host"><br>
        홈페이지: <input type="url" placeholder="http://"><br>
        전화번호: <input type="tel" placeholder="010-1234-5678"> <br>
        선호색상: <input type="color" value="#00BFF"
            onchange="document.body.style.color=this.value"> <br>
        이미지 버튼: <input type="image" src="button.png">
        <button type="button"><img src="button.png"></button>
    <input type="submit" value="확인">
    </fieldset>
    <br><br>
    <hr>
        검색어: <input type="search" placeholder="검색어">
        <input type="button" value="검색">
    </form>
    <form>
        지속시간(0.0~10.0시간) :
        <input type="number" min="0.0" max="10.0" 
        step="0.5"><br><br>
        온도설정:10&deg;
        <input type="range" min="10" max="30" 
        list="temperatures">30&deg;
        <datalist id="temperatures">
            <option value="12" label="Low">
            <option value="20" label="Medium">
            <option value="28" label="High">
        </datalist>
    </form>
    
    <hr>

    <form>
    <table>
        <tr><td>생일</td>
        <td><input type="date" value="2003-02-09"></td></tr>
        <tr><td>생일파티시간</td>
        <td><input type="time"></td></tr>
        <tr><td>생일파티장소</td>
        <td><input type="text" list="placelist">
            <datalist id="placelist">
                <option>KFC</option>
                <option>오일내</option>
                <option>감자탕</option>
            </datalist>
            </td></tr>

    </table>
    <br>
    <form>
        <fieldset>
            <legend>저녁 메뉴</legend>
           
                <label >
                         <input type="radio" name="china" value="1">
                         짜장면 <img src="jajang.png">
                </label><br>
     
                <label>
                    <input type="radio"  name="china" value="2">짬뽕
                    <img src="jjambbong.png">
                </label><br>

                <label >
                    <input type="radio"  name="china" value="3">탕수육<img src="tangsuyuk.png">
                </label>
                <br><br>



        </fieldset>
    </form>

                짜장면 <input type="checkbox">
                짬뽕   <input type="checkbox">
                탕수육 <input type="checkbox">
</body>
</html>
